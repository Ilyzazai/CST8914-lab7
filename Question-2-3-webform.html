<!DOCTYPE html>
<html lang="en">

<head>
  <title>Form validation with messages on top: Code example - Accessibility Developer Guide example</title>
  <meta charset="utf-8">
  <style>
    .control,
    fieldset {
      margin: 6px 0;
    }

    label {
      display: inline-block;
      width: 120px;
      vertical-align: top;
    }

    input+label {
      width: auto;
    }

    .error,
    .required {
      color: red;
    }

    fieldset ul {
      margin: 0;
    }

    .error-summary {
      border: 2px solid red;
      padding: 12px;
      margin-bottom: 16px;
    }

    .success-message {
      border: 2px solid green;
      padding: 12px;
      margin-bottom: 16px;
    }
  </style>
</head>

<body>
  <h1>Feedback form</h1>

  <form>
    <div class="control">

      <label for="name">Full name <span class="required">*</span></label>
      <input id="name" name="name" type="text">
    </div>

    <div class="control">

      <label for="biography">Biography</label>

      <textarea id="biography" name="biography" aria-describedby="biography_help"></textarea>
      <span id="biography_help">Include examples on your skills in JavaScript.</span>
    </div>


    <fieldset id="gender_group">
      <legend>Gender</legend>
      <div class="control">
        <input id="gender_male" name="gender" type="radio" value="male">
        <label for="gender_male">Male</label>
      </div>
      <div class="control">
        <input id="gender_female" name="gender" type="radio" value="female">
        <label for="gender_female">Female</label>
      </div>
    </fieldset>

    <div class="control">
      <input id="accept_agbs" name="accept_agbs" type="checkbox" value="1">
      <label for="accept_agbs">I accept the terms and conditions</label>
    </div>

    <div class="control">
      <input name="validate" type="hidden" value="1">
      <input type="submit" value="Register">
    </div>
  </form>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"
    integrity="sha256-FgpCb/KJQlLNfOu91ta32o/NMZxltwRo8QtmkMRdAu8=" crossorigin="anonymous"></script>
  <script>
    "use strict";

    (function () {
      var validateInput;
      var hasErrors = false;

      $.urlParam = function (name) {
        var results;
        results = new RegExp('[?&]' + name + '=([^&#]*)').exec(window.location.href);

        if (results === null) {
          return null;
        } else {
          return decodeURI(results[1]) || null;
        }
      };

      validateInput = function validateInput(input, message) {
        var $elementToDescribe, $error, $errorContainer, $fieldset, $input, $referencedElement, value;

        $input = $('[name="' + input + '"]');

        if ((value = $.urlParam(input)) === null) {
          hasErrors = true;


          if ($('#error-summary').length === 0) {
            $('form').prepend(
              '<fieldset id="error-summary" class="errors error-summary" role="alert" aria-live="assertive" tabindex="-1">' +
              '<legend>Errors</legend>' +
              '<ul></ul>' +
              '</fieldset>'
            );
          }

          $referencedElement = null;
          $elementToDescribe = null;
          $errorContainer = $('#error-summary ul');

          if ($input.is(':radio')) {
            $fieldset = $('#gender_group');
            $elementToDescribe = $fieldset;
            $referencedElement = $input.filter(':first');
          } else {
            $elementToDescribe = $input;
            $referencedElement = $input;
          }


          $error = $('<a href="#' + $referencedElement.attr('id') + '" class="error">' + message + '</a>');

          $error.on('click', function (e) {
            e.preventDefault();
            $referencedElement.focus();
          });


          var errorId = input + '_description';

          if ($('#' + errorId).length === 0) {
            $('<span id="' + errorId + '" class="error" style="display:none;">' + message + '</span>').insertAfter($referencedElement.last());
          }

          $elementToDescribe.attr('aria-describedby', errorId);
          $referencedElement.attr('aria-invalid', 'true');

          $errorContainer.append('<li class="error"></li>');
          $errorContainer.find('li:last').append($error);
        } else {
          if ($input.is(':checkbox')) {
            $input.prop('checked', true);
          } else if ($input.is(':radio')) {
            $input.filter('[value="' + value + '"]').prop('checked', true);
          } else {
            $input.val(value);
          }
        }
      };

      $(document).ready(function () {
        if ($.urlParam('validate')) {
          validateInput('name', 'Please enter your name!');
          validateInput('biography', 'Please tell us something about your history!');
          validateInput('gender', 'Please tell us your gender!');
          validateInput('accept_agbs', 'You must accept our terms and conditions!');

          if (hasErrors) {
            $('#error-summary').focus();
          } else {
            $('form').prepend(
              '<div id="success-message" class="success-message" role="status" aria-live="polite" tabindex="-1">' +
              'All inputs are valid.' +
              '</div>'
            );
            $('#success-message').focus();
          }
        }
      });
    }).call(void 0);
  </script>
</body>

</html>
